<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ledger Explorer</title>
  <link rel="stylesheet" href="./app.css?v=202607231500">
</head>
<body>

  <div class="top-layout">
    <div id="companyHeader" class="company-header" hidden></div>
    <div class="filter-panel toolbar-primary">
      <div id="columnToggleGroup" class="column-toggle-group" aria-label="Column display options"></div>

      <label>
        <span id="monthLabelText">対象月</span>
        <select id="monthSelect"></select>
      </label>

      <label id="asOfLabel">
        <span id="asOfLabelText">基準月</span>
        <select id="asOfSelect"></select>
      </label>

      <label id="accountLabel">
        科目 / Account
        <select id="accountSelect"></select>
      </label>

      <label id="searchLabel">
        <span id="searchLabelText">検索</span>
        <input id="searchInput" type="text" placeholder="摘要など（部分一致）" />
      </label>
      <span class="status status--response" id="status"></span>
    </div>
  </div>

  <div class="row navigation-row">
    <div class="toolbar-row toolbar-primary">
      <div id="modeSwitch" class="mode-switch" role="group" aria-label="表示モード"></div>
      <span id="modeNavSeparator" class="nav-separator" aria-hidden="true">｜</span>
      <div id="documentTypeNav" class="document-type-nav" role="group" aria-label="対象文書" hidden></div>
      <div class="nav" id="nav"></div>

      <span id="aboutSeparator" class="nav-separator" aria-hidden="true">｜</span>
      <button id="about" class="about-button" type="button">
        <a id="aboutLink" class="button" href="./about.html">概要</a>
      </button>
    </div>

  </div>

  <div class="table-wrap" id="tableWrap"></div>

  <div class="footer-row">
    <div class="copyright">
      <small>
        © 2026 SAMBUICHI, Nobuyuki (Sambuichi Professional Engineers Office)
        · <a href="https://www.sambuichi.jp/" target="_blank" rel="noopener">sambuichi.jp</a>
        · <a href="https://github.com/pontsoleil/LedgerExplorer/blob/main/LICENSE-CODE" target="_blank" rel="license noopener">MIT License</a>
      </small>
    </div>

    <div class="footer-right">
      <div id="fontSizeControl" class="font-size-control" role="group" aria-label="表示文字サイズ">
        <span id="fontSizeLabel">文字</span>
        <button type="button" data-font-size="small">小</button>
        <button type="button" data-font-size="medium">中</button>
        <button type="button" data-font-size="large">大</button>
      </div>

      <label class="footer-language">
        Language / 言語
        <select id="langSelect">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </label>

      <div class="build-timestamp" aria-label="この改訂版の生成日時">
        生成日時：2026-07-21 13:10
      </div>
    </div>
  </div>

  <script src="./app.js?v=202607231525"></script>
</body>
</html>
