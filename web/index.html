<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ledger Explorer</title>
  <link rel="stylesheet" href="./app.css?v=202607211310">
</head>
<body>

  <div class="row">
    <div class="nav" id="nav"></div>

    <button id="about" type="button">
      <a class="button" href="./about_en.html">ABOUT</a>
    </button>

    <label>
      Language / 言語
      <select id="langSelect">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </label>

    <label>
      対象月 / Month
      <select id="monthSelect"></select>
    </label>

    <label id="accountLabel">
      科目 / Account
      <select id="accountSelect"></select>
    </label>

    <label>
      検索 / Search
      <input id="searchInput" type="text" placeholder="摘要など（部分一致）" />
    </label>

    <label>
      CSV Upload
      <input id="fileInput" type="file" accept=".csv,text/csv" />
    </label>

    <button id="useServerBtn" type="button">Use server data</button>

  </div>

  <div class="status" id="status"></div>
  <div class="status" style="margin-top:-2px">Tip: Select “構造化CSV / Structured CSV” to view monthly tidy files.</div>

  <div class="table-wrap" id="tableWrap"></div>

  <div class="copyright">
    <small>

    </small>
  </div>

  <div class="build-timestamp" aria-label="この改訂版の生成日時">
    生成日時：2026-07-21 13:10
  </div>

  <script src="./app.js?v=202607211310"></script>
</body>
</html>
